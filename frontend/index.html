<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script>
      (function() {
        var images = {
          morning: '/morning.jpg',
          afternoon: '/afternoon.png',
          evening: '/evening.jpg',
          night: '/night.png'
        };
        var period = localStorage.getItem('timePeriod');
        if (!period || !images[period]) {
          var hour = new Date().getHours();
          if (hour >= 5 && hour < 12) period = 'morning';
          else if (hour >= 12 && hour < 17) period = 'afternoon';
          else if (hour >= 17 && hour < 20) period = 'evening';
          else period = 'night';
        }
        var isLight = period === 'morning' || period === 'afternoon';
        if (images[period]) {
          document.documentElement.style.setProperty('--page-bg-image', 'url(' + images[period] + ')');
        }
        document.documentElement.style.backgroundColor = isLight ? '#f5f5f7' : '#080808';
        document.documentElement.style.colorScheme = isLight ? 'light' : 'dark';
        if (isLight) document.documentElement.classList.add('light');
      })();
    </script>
    <style>
      html { background-color: #080808; }
      html.light { background-color: #f5f5f7; }
    </style>

    <!-- Primary Meta Tags -->
    <title>Romeiro Fernandes</title>
